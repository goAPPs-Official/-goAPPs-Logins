<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goApps | Secure Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.95);
            --success: #2dd4bf;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); font-family: 'Inter', sans-serif;
            color: white; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Background Layers */
        #bg-canvas { position: fixed; inset: 0; z-index: 1; }
        #enc-canvas { position: fixed; inset: 0; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.5s; }

        /* Main UI */
        .main-container { position: relative; z-index: 10; width: 380px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(25px);
            padding: 2.2rem; border-radius: 32px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .logo-text { font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem; letter-spacing: -1px; }

        /* Accordion Style */
        .auth-option { margin-bottom: 12px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255,255,255,0.02); }
        .auth-header { width: 100%; padding: 18px; background: none; border: none; color: white; display: flex; align-items: center; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .auth-header span { margin-right: 15px; font-size: 1.3rem; }
        .auth-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; padding: 0 18px; }
        .auth-option.active { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); transform: scale(1.02); }
        .auth-option.active .auth-content { max-height: 250px; padding-bottom: 18px; }

        input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; font-family: 'Inter', sans-serif; }
        input:focus { border-color: var(--primary); }
        
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: #030712; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(3, 7, 18, 0.9); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(12px); }
        .modal-content { background: var(--card-bg); padding: 2.5rem; border-radius: 28px; border: 1px solid var(--border); text-align: center; width: 300px; }

        /* Signal Meter */
        .signal-meter { display: flex; gap: 3px; align-items: flex-end; height: 15px; }
        .signal-bar { width: 4px; background: var(--primary); border-radius: 1px; opacity: 0.3; }
        .signal-active { opacity: 1; }

        /* Progress Bar */
        .p-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 20px; overflow: hidden; }
        .p-fill { height: 100%; width: 0%; background: var(--primary); transition: width 2.2s linear; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="enc-canvas"></canvas>

    <div id="sync-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; font-family: 'Fira Code'; font-size: 0.65rem; color: var(--primary); margin-bottom: 20px;">
                <div class="signal-meter">
                    <div class="signal-bar signal-active" style="height: 40%"></div>
                    <div class="signal-bar signal-active" style="height: 70%"></div>
                    <div class="signal-bar signal-active" style="height: 100%; animation: pulse 1s infinite"></div>
                </div>
                <div id="ping-val">PING: 22ms</div>
            </div>
            <div style="font-size: 3rem;">🛰️</div>
            <h3 style="margin: 15px 0 5px; letter-spacing: 2px;">SYNCING LINK</h3>
            <p style="font-size: 0.7rem; color: #64748b; font-family: 'Fira Code';">ID: <span id="conn-id" style="color:white">---</span></p>
            <div class="p-bar"><div class="p-fill" id="p-fill"></div></div>
            <p id="log-text" style="font-size: 0.6rem; color: var(--success); margin-top: 10px; font-family: 'Fira Code';">Initializing Handshake...</p>
        </div>
    </div>

    <div id="otp-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 2.5rem;">🛡️</div>
            <h3 style="color: var(--primary);">2FA Verification</h3>
            <p id="otp-msg" style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px;"></p>
            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 20px;">
                <input type="text" class="otp-i" maxlength="1" oninput="moveF(this)" style="width: 40px; text-align: center; font-weight: 800;">
                <input type="text" class="otp-i" maxlength="1" oninput="moveF(this)" style="width: 40px; text-align: center; font-weight: 800;">
                <input type="text" class="otp-i" maxlength="1" oninput="moveF(this)" style="width: 40px; text-align: center; font-weight: 800;">
                <input type="text" class="otp-i" maxlength="1" oninput="moveF(this)" style="width: 40px; text-align: center; font-weight: 800;">
            </div>
            <button class="submit-btn" onclick="verifyFinal()">Finalize Access</button>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <div class="logo-text">goApps Terminal</div>
            
            <div id="login-accordion">
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAcc(this)"><span>💬</span> WhatsApp</button>
                    <div class="auth-content">
                        <input type="text" class="l-id" placeholder="Phone Number">
                        <input type="password" class="l-key" placeholder="Access Key">
                        <button class="submit-btn" onclick="startHandshake(this)">Connect via WhatsApp</button>
                    </div>
                </div>
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAcc(this)"><span>✈️</span> Telegram</button>
                    <div class="auth-content">
                        <input type="text" class="l-id" placeholder="@username">
                        <input type="password" class="l-key" placeholder="Access Key">
                        <button class="submit-btn" onclick="startHandshake(this)">Connect via Telegram</button>
                    </div>
                </div>
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAcc(this)"><span>✉️</span> Email</button>
                    <div class="auth-content">
                        <input type="email" class="l-id" placeholder="email@address.com">
                        <input type="password" class="l-key" placeholder="Access Key">
                        <button class="submit-btn" onclick="startHandshake(this)">Connect via Email</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const USER_DB = [
            { id: "2348157505037", key: "pass1", profile: "admin" },
            { id: "@chima_pro", key: "pass2", profile: "chima" },
            { id: "student@goapps.com", key: "pass3", profile: "student-hub" },
            { id: "2349012345678", key: "pass4", profile: "adebayo" },
            { id: "@precious_dev", key: "pass5", profile: "precious" }
        ];

        let targetProfile = "";

        // --- ENCRYPTION TUNNEL (HEX CANVAS) ---
        const encCanvas = document.getElementById('enc-canvas');
        const encCtx = encCanvas.getContext('2d');
        function drawHex() {
            encCtx.clearRect(0,0,encCanvas.width,encCanvas.height);
            encCtx.fillStyle = "rgba(56, 189, 248, 0.15)";
            encCtx.font = "10px Fira Code";
            for(let i=0; i<50; i++) {
                const txt = Math.random().toString(16).substring(2, 10).toUpperCase();
                encCtx.fillText(txt, Math.random()*encCanvas.width, Math.random()*encCanvas.height);
            }
            if(encCanvas.style.opacity > 0) requestAnimationFrame(drawHex);
        }

        // --- HANDSHAKE LOGIC ---
        function startHandshake(btn) {
            const container = btn.parentElement;
            const id = container.querySelector('.l-id').value;
            const key = container.querySelector('.l-key').value;
            const user = USER_DB.find(u => u.id === id && u.key === key);

            if(!user) return alert("ACCESS DENIED: Credentials not found.");

            targetProfile = user.profile;
            const channel = btn.innerText.split('via ')[1];
            localStorage.setItem('last_ch', channel);

            // Trigger Sensory Feedback
            if(navigator.vibrate) navigator.vibrate([40, 80, 40]);
            playTone();

            // Show Hex Tunnel
            encCanvas.width = window.innerWidth; encCanvas.height = window.innerHeight;
            encCanvas.style.opacity = "1";
            drawHex();

            // Show Sync Modal
            document.getElementById('conn-id').innerText = "GOCBT-" + Math.random().toString(36).substring(2,8).toUpperCase();
            document.getElementById('sync-modal').style.display = 'flex';
            
            let prog = 0;
            const logs = ["Building Tunnel...", "Mesh Pairing...", "Link Verified"];
            const pFill = document.getElementById('p-fill');
            const logTxt = document.getElementById('log-text');

            const interval = setInterval(() => {
                prog += 33.4;
                pFill.style.width = prog + "%";
                logTxt.innerText = logs[Math.floor(prog/34)];
                document.getElementById('ping-val').innerText = `PING: ${Math.floor(Math.random()*10+15)}ms`;
                
                if(prog >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('sync-modal').style.display = 'none';
                        encCanvas.style.opacity = "0";
                        showOTP(channel);
                    }, 800);
                }
            }, 700);
        }

        function showOTP(ch) {
            document.getElementById('otp-msg').innerHTML = `Routed secure code to your <b>${ch}</b>.`;
            document.getElementById('otp-modal').style.display = 'flex';
            document.querySelectorAll('.otp-i')[0].focus();
        }

        function verifyFinal() {
            let code = "";
            document.querySelectorAll('.otp-i').forEach(i => code += i.value);
            if(code === "1234") {
                window.location.href = "https://goapps-official.github.io/My-Profile/" + targetProfile;
            } else {
                alert("INVALID CODE");
            }
        }

        // --- UTILS ---
        function toggleAcc(el) {
            const p = el.parentElement;
            const wasActive = p.classList.contains('active');
            document.querySelectorAll('.auth-option').forEach(o => o.classList.remove('active'));
            if(!wasActive) p.classList.add('active');
        }

        function moveF(el) { if(el.value && el.nextElementSibling) el.nextElementSibling.focus(); }

        function playTone() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.setValueAtTime(500, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.2);
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        }

        // Channel Memory
        window.onload = () => {
            const last = localStorage.getItem('last_ch');
            if(last) {
                const headers = document.querySelectorAll('.auth-header');
                headers.forEach(h => { if(h.innerText.includes(last)) toggleAcc(h); });
            }
        };

        // Static Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = [];
            for(let i=0; i<50; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5});
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(56, 189, 248, 0.1)";
            pts.forEach(p => {
                p.x += p.vx*0.2; p.y += p.vy*0.2;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        init(); draw(); window.onresize = init;
    </script>
</body>
</html>
