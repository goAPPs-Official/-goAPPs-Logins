<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goApps | Multi-Channel Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.9);
            --success: #2dd4bf;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); font-family: 'Inter', sans-serif;
            color: white; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 1; }

        /* --- UI CONTAINER --- */
        .main-container { position: relative; z-index: 10; width: 380px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: 2rem; border-radius: 28px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-text { font-size: 1.8rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem; }

        /* --- ACCORDION SYSTEM --- */
        .auth-option { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
        .auth-header { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05); 
            border: none; color: white; display: flex; align-items: center; 
            cursor: pointer; font-weight: 600; font-size: 0.9rem;
        }
        .auth-header span { margin-right: 12px; font-size: 1.2rem; }
        .auth-header:hover { background: rgba(255,255,255,0.1); }
        
        .auth-content { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; 
            background: rgba(0,0,0,0.2); padding: 0 15px;
        }
        .auth-option.active { border-color: var(--primary); }
        .auth-option.active .auth-content { max-height: 250px; padding: 15px; }

        input { 
            width: 100%; padding: 12px; margin: 8px 0; 
            background: rgba(0,0,0,0.4); border: 1px solid var(--border); 
            border-radius: 10px; color: white; outline: none; 
        }
        input:focus { border-color: var(--primary); }

        .submit-btn { 
            width: 100%; padding: 12px; background: linear-gradient(90deg, var(--primary), var(--secondary)); 
            border: none; border-radius: 10px; color: #030712; font-weight: 700; 
            cursor: pointer; margin-top: 10px;
        }

        .toggle-link { margin-top: 20px; font-size: 0.8rem; color: #64748b; cursor: pointer; display: block; }
        .toggle-link span { color: var(--primary); font-weight: 600; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main-container">
        <div class="card">
            <div class="logo-text" id="view-title">goApps Login</div>

            <div id="login-view">
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAccordion(this)"><span>💬</span> WhatsApp Access</button>
                    <div class="auth-content">
                        <input type="text" class="login-id" placeholder="Phone Number (e.g. 234...)">
                        <input type="password" class="login-key" placeholder="Access Key">
                        <button class="submit-btn" onclick="handleAuth(this)">Unlock via WhatsApp</button>
                    </div>
                </div>

                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAccordion(this)"><span>✈️</span> Telegram Access</button>
                    <div class="auth-content">
                        <input type="text" class="login-id" placeholder="@username">
                        <input type="password" class="login-key" placeholder="Access Key">
                        <button class="submit-btn" onclick="handleAuth(this)">Unlock via Telegram</button>
                    </div>
                </div>

                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAccordion(this)"><span>✉️</span> Email Access</button>
                    <div class="auth-content">
                        <input type="email" class="login-id" placeholder="email@address.com">
                        <input type="password" class="login-key" placeholder="Access Key">
                        <button class="submit-btn" onclick="handleAuth(this)">Unlock via Email</button>
                    </div>
                </div>
                
                <a class="toggle-link" onclick="toggleView()">New Identity? <span>Register Account</span></a>
            </div>

            <div id="signup-view" class="hidden">
                <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 15px;">Choose your primary sync channel:</p>
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleAccordion(this)"><span>💬</span> WhatsApp Sync</button>
                    <div class="auth-content">
                        <input type="text" placeholder="Full Name">
                        <input type="text" placeholder="Phone Number">
                        <button class="submit-btn" onclick="handleReg()">Register Channel</button>
                    </div>
                </div>
                <a class="toggle-link" onclick="toggleView()">Existing Identity? <span>Back to Login</span></a>
            </div>
        </div>
    </div>

    <script>
        // --- DEMO USER DATABASE ---
        const USER_DB = [
            { id: "2348157505037", key: "pass1", profile: "admin" },
            { id: "@chima_pro", key: "pass2", profile: "chima" },
            { id: "student@goapps.com", key: "pass3", profile: "student-hub" },
            { id: "2349012345678", key: "pass4", profile: "adebayo" },
            { id: "@precious_dev", key: "pass5", profile: "precious" }
        ];

        const BASE_URL = "https://goapps-official.github.io/My-Profile/";

        function toggleAccordion(element) {
            const parent = element.parentElement;
            const isActive = parent.classList.contains('active');
            
            document.querySelectorAll('.auth-option').forEach(opt => opt.classList.remove('active'));
            if (!isActive) parent.classList.add('active');
        }

        function toggleView() {
            const loginView = document.getElementById('login-view');
            const signupView = document.getElementById('signup-view');
            const title = document.getElementById('view-title');
            
            loginView.classList.toggle('hidden');
            signupView.classList.toggle('hidden');
            title.innerText = loginView.classList.contains('hidden') ? "goApps Register" : "goApps Login";
        }

        function handleAuth(btn) {
            const container = btn.parentElement;
            const idInput = container.querySelector('.login-id').value.trim();
            const keyInput = container.querySelector('.login-key').value;

            const user = USER_DB.find(u => u.id === idInput && u.key === keyInput);

            if(user) {
                btn.innerText = "Verifying...";
                btn.style.opacity = "0.7";
                setTimeout(() => {
                    window.location.href = `${BASE_URL}${user.profile}`;
                }, 1200);
            } else {
                alert("Invalid Access Credentials for this channel.");
            }
        }

        function handleReg() {
            alert("Registration request sent to System Administrator via FEX protocol.");
        }

        // --- BACKGROUND CANVAS LOGIC (UNCHANGED) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(56, 189, 248, 0.2)";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        init(); draw(); window.addEventListener('resize', init);
    </script>
</body>
</html>
