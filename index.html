<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goApps|🔐Secure Terminal v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8; --secondary: #818cf8; --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.9); --success: #2dd4bf;
            --border: rgba(255, 255, 255, 0.1); --danger: #ef4444;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg); font-family: 'Inter', sans-serif;
            color: white; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Background Layers */
        #bg-canvas, #enc-canvas { position: fixed; inset: 0; }
        #bg-canvas { z-index: 1; }
        #enc-canvas { z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.5s; }

        /* Main UI */
        .main-container { position: relative; z-index: 10; width: 380px; }
        .card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: 2rem; border-radius: 32px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative; overflow: hidden;
        }

        /* Lockout Overlay */
        #lockout-screen {
            position: absolute; inset: 0; background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(10px); display: none; z-index: 50;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* Slider */
        .slider-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .min-slider { -webkit-appearance: none; width: 60px; height: 3px; background: var(--border); border-radius: 5px; outline: none; }
        .min-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; cursor: pointer; }

        .logo-text { font-size: 1.8rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.2rem; }

        /* Accordion */
        .auth-option { margin-bottom: 10px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; background: rgba(255,255,255,0.02); }
        .auth-header { width: 100%; padding: 15px; background: none; border: none; color: white; display: flex; align-items: center; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .auth-header span { margin-right: 12px; font-size: 1.2rem; }
        .auth-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; padding: 0 15px; }
        .auth-option.active { border-color: var(--primary); background: rgba(56, 189, 248, 0.05); }
        .auth-option.active .auth-content { max-height: 350px; padding-bottom: 15px; }

        input { width: 100%; padding: 12px; margin: 6px 0; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        
        .submit-btn { width: 100%; padding: 12px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; color: #030712; font-weight: 800; cursor: pointer; margin-top: 8px; font-size: 0.75rem; letter-spacing: 1px; }

        /* QR Scanner */
        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; position: relative; margin-top: 15px; }
        .scan-line { position: absolute; left: 0; width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 8px var(--primary); animation: scan 2s infinite linear; }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(3, 7, 18, 0.95); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(15px); }
        .modal-content { background: var(--card-bg); padding: 2rem; border-radius: 28px; border: 1px solid var(--border); text-align: center; width: 300px; }
        
        .p-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-top: 15px; overflow: hidden; }
        .p-fill { height: 100%; width: 0%; background: var(--primary); transition: width 2s linear; }

        .hidden { display: none; }
        .toggle-link { margin-top: 15px; font-size: 0.75rem; color: #64748b; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="enc-canvas"></canvas>

    <div class="main-container">
        <div class="card">
            <div id="lockout-screen">
                <div style="font-size: 3rem;">⚠️</div>
                <h3 style="color: var(--danger); margin: 10px 0;">SYSTEM LOCKDOWN</h3>
                <p style="font-size: 0.7rem; color: #94a3b8;">Multiple failed attempts detected.</p>
                <div id="lock-timer" style="font-size: 1.5rem; font-family: 'Fira Code'; margin-top: 10px; color: white;">60s</div>
            </div>

            <div class="slider-container">
                <span style="font-size: 0.5rem; color: #64748b;">AESTHETIC</span>
                <input type="range" class="min-slider" min="0.5" max="1" step="0.01" value="0.9" oninput="document.querySelector('.card').style.backgroundColor=`rgba(15,23,42,${this.value})`">
            </div>

            <div class="logo-text">goApps</div>
            
            <div id="login-v">
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleA(this)"><span>💬</span> WhatsApp</button>
                    <div class="auth-content">
                        <input type="text" class="l-id" placeholder="Phone ID">
                        <input type="password" class="l-key" placeholder="Key">
                        <div style="display: flex; gap: 5px;">
                            <button class="submit-btn" style="background: #25D366; color: white;" onclick="requestKey()">Get Key</button>
                            <button class="submit-btn" onclick="processLogin(this)">Enter</button>
                        </div>
                    </div>
                </div>
                <div class="auth-option">
                    <button class="auth-header" onclick="toggleA(this)"><span>✈️</span> Telegram</button>
                    <div class="auth-content">
                        <input type="text" class="l-id" placeholder="@username">
                        <input type="password" class="l-key" placeholder="Key">
                        <button class="submit-btn" onclick="processLogin(this)">Enter</button>
                    </div>
                </div>
                <div class="qr-box">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=goapps_init" id="qr-img" style="width:100px; height:100px;">
                    <div class="scan-line"></div>
                </div>
                <a class="toggle-link" onclick="swap()">New Identity? <span>Register</span></a>
            </div>

            <div id="reg-v" class="hidden">
                <input type="email" id="re" placeholder="Email Address">
                <input type="tel" id="rw" placeholder="WhatsApp Number">
                <label style="display:flex; gap:8px; margin:15px 0; font-size:0.6rem; color:#64748b; text-align:left;">
                    <input type="checkbox" id="tc" onchange="document.getElementById('rb').disabled=!this.checked; document.getElementById('rb').style.opacity=this.checked?1:0.4;">
                    <span>Accept <span style="color:var(--primary); text-decoration:underline; cursor:pointer;" onclick="alert('Privacy Protocol: Data is end-to-end encrypted.')">Privacy Protocol</span></span>
                </label>
                <button id="rb" class="submit-btn" onclick="doReg()" style="opacity:0.4" disabled>Link via WhatsApp</button>
                <a class="toggle-link" onclick="swap()">Back to Login</a>
            </div>
        </div>
    </div>

    <div id="sync-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 2rem; margin-bottom: 10px;">🛰️</div>
            <h4 id="sync-status">SYNCING LINK...</h4>
            <div class="p-bar"><div class="p-fill" id="p-fill"></div></div>
        </div>
    </div>

    <script>
        const DB = [
            {id: "2348157505037", k: "pass1", p: "admin"},
            {id: "@chima_pro", k: "pass2", p: "chima"},
            {id: "student@goapps.com", k: "pass3", p: "student-hub"}
        ];
        
        let attempts = 0;
        let target = "";

        function toggleA(e) { 
            const p=e.parentElement; const a=p.classList.contains('active'); 
            document.querySelectorAll('.auth-option').forEach(x=>x.classList.remove('active')); 
            if(!a) p.classList.add('active'); 
        }

        function swap() { document.getElementById('login-v').classList.toggle('hidden'); document.getElementById('reg-v').classList.toggle('hidden'); }

        function requestKey() {
            const id = document.querySelector('.l-id').value;
            if(!id) return alert("Enter Phone ID first.");
            window.location.href = `https://wa.me/2348157505037?text=${encodeURIComponent("Request Login access\nUser: "+id)}`;
        }

        function processLogin(btn) {
            const p = btn.closest('.auth-content');
            const id = p.querySelector('.l-id').value;
            const key = p.querySelector('.l-key').value;
            const u = DB.find(x => x.id === id && x.k === key);

            if(u) {
                attempts = 0;
                target = u.p;
                startSync();
            } else {
                attempts++;
                if(attempts >= 3) triggerLockout();
                else alert(`ACCESS DENIED. Attempt ${attempts}/3`);
            }
        }

        function triggerLockout() {
            const screen = document.getElementById('lockout-screen');
            const timer = document.getElementById('lock-timer');
            screen.style.display = 'flex';
            let sec = 60;
            const iv = setInterval(() => {
                sec--; timer.innerText = sec + "s";
                if(sec <= 0) { clearInterval(iv); screen.style.display = 'none'; attempts = 0; }
            }, 1000);
        }

        function startSync() {
            document.getElementById('sync-modal').style.display='flex';
            const f = document.getElementById('p-fill');
            let p = 0;
            const iv = setInterval(() => {
                p += 10; f.style.width = p + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    window.location.href = "https://goapps-official.github.io/My-Profile/" + target;
                }
            }, 150);
        }

        function doReg() {
            const e = document.getElementById('re').value;
            const w = document.getElementById('rw').value;
            window.location.href = `https://wa.me/2348157505037?text=${encodeURIComponent("link goAPPs\nEmail: "+e+"\nWA: "+w)}`;
        }

        // Init Background
        window.onload = () => {
            const c = document.getElementById('bg-canvas'); const x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            let pts = []; for(let i=0; i<30; i++) pts.push({x:Math.random()*c.width, y:Math.random()*c.height, v:Math.random()*0.5+0.1});
            function draw() {
                x.clearRect(0,0,c.width,c.height); x.fillStyle="rgba(56,189,248,0.1)";
                pts.forEach(p => { p.y-=p.v; if(p.y<0) p.y=c.height; x.beginPath(); x.arc(p.x,p.y,1,0,7); x.fill(); });
                requestAnimationFrame(draw);
            } draw();
            
            // QR Rotation
            setInterval(() => {
                document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=sync_${Math.random()}`;
            }, 10000);
        };
    </script>
</body>
</html>
